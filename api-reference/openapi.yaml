openapi: '3.0.3'
info:
  title: trading-app-web BrowserAct FX Reports
  version: 1.0.0
  description: >
    HTTP API for generating and validating FX BrowserAct reports in the trading
    application.


    This API exposes endpoints for synchronous and asynchronous FX report
    generation, validation of payloads, and downloading generated PDF files.


    Authentication and authorization requirements are not specified at the
    route level in this specification. Refer to the overall trading-app-web
    security and deployment configuration for details on how access is
    controlled.
servers:
  - url: http://localhost:8000
    description: Local development server
tags:
  - name: BrowserAct Reports
    description: Endpoints for generating and validating BrowserAct FX reports
  - name: BrowserAct Report Files
    description: Endpoints for downloading generated BrowserAct FX report files
paths:
  /api/v1/browseract/reports/fx/generate:
    post:
      tags:
        - BrowserAct Reports
      summary: Generate FX report asynchronously
      description: >
        Initiates asynchronous generation of an FX BrowserAct report using a
        previously executed BrowserAct run.


        The request payload specifies the `browseract_run_id` to use and
        which sections to include via `include_*` flags.
      operationId: generateFxReportAsync
      requestBody:
        description: Parameters and context for asynchronous FX report generation
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateFXReportRequest'
      responses:
        '202':
          description: FX report generation accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncFXReportResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error while starting report generation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/browseract/reports/fx/generate-sync:
    post:
      tags:
        - BrowserAct Reports
      summary: Generate FX report synchronously
      description: >
        Generates an FX BrowserAct report synchronously using a previously
        executed BrowserAct run and returns metadata about the generated PDF
        in the response.


        The request payload specifies the `browseract_run_id` to use and
        which sections to include via `include_*` flags.
      operationId: generateFxReportSync
      requestBody:
        description: Parameters and context for synchronous FX report generation
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateFXReportRequest'
      responses:
        '200':
          description: FX report generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncFXReportResponse'
        '400':
          description: Invalid request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error while generating report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/browseract/reports/fx/generate-from-data:
    post:
      tags:
        - BrowserAct Reports
      summary: Generate FX report from BrowserAct data
      description: >
        Generates an FX BrowserAct report synchronously using a complete data
        payload instead of referencing an existing BrowserAct run.


        The request payload carries batch FX data and controls which sections
        are included via `include_*` flags.
      operationId: generateFxReportFromData
      requestBody:
        description: BrowserAct batch data and parameters used to build the FX report
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrowserActDataRequest'
      responses:
        '200':
          description: FX report generated successfully from provided data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncFXReportResponse'
        '400':
          description: Invalid data payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error while generating report from data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/browseract/reports/fx/generate-full:
    post:
      tags:
        - BrowserAct Reports
      summary: Generate full FX report
      description: >
        Generates a full FX BrowserAct report synchronously using optional
        trading context information and include flags.


        The request payload allows specifying which sections to include via
        `include_*` flags, an optional `documentero_template_id`, and an
        optional `trading_context`.
      operationId: generateFullFxReport
      requestBody:
        description: Full request payload with optional trading context for generating the FX report
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullFXReportRequest'
      responses:
        '200':
          description: Full FX report generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SyncFXReportResponse'
        '400':
          description: Invalid full report request payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error while generating full report
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/browseract/reports/fx/validate:
    post:
      tags:
        - BrowserAct Reports
      summary: Validate FX report data payload
      description: >
        Validates a BrowserAct FX data payload without generating a report.


        Returns structured validation results including a boolean `valid`
        flag, a high-level `summary`, detailed `details`, and optional
        `report_date` and `report_time` fields if available.
      operationId: validateFxReportPayload
      requestBody:
        description: BrowserAct data payload to validate for FX report generation
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BrowserActDataRequest'
      responses:
        '200':
          description: Validation result for the submitted FX report data payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidateFXResponse'
        '400':
          description: Invalid payload format preventing validation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error while validating payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /api/v1/browseract/reports/files/{filePath}:
    get:
      tags:
        - BrowserAct Report Files
      summary: Download generated report file
      description: >
        Serves a previously generated BrowserAct FX report file as a PDF.


        The `filePath` parameter is a best-effort encoded path segment that
        may internally map to a filesystem path and may represent nested
        directories. When calling this endpoint, clients should URL-encode
        any slashes or special characters as required by their HTTP client.
      operationId: downloadReportFile
      parameters:
        - name: filePath
          in: path
          required: true
          description: >
            Encoded relative path of the report file to download. Although the
            underlying file path may contain directory separators, this value
            must be provided as a single URL-encoded path segment.
          schema:
            type: string
      responses:
        '200':
          description: PDF report file
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '404':
          description: Report file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Server error while retrieving report file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    TradingContextInput:
      type: object
      description: >
        Trading context information used as optional input when generating FX
        BrowserAct reports.
      properties:
        openPositions:
          type: string
          description: Description of the user's open FX positions.
          example: "User has 5 open FX positions in major currency pairs."
        openOrders:
          type: string
          description: Description of the user's open FX orders.
          example: "2 pending limit orders on EUR/USD and GBP/USD."
        portfolioSize:
          type: string
          description: Description of the overall FX portfolio size.
          example: "Total FX portfolio size is approximately 2M USD."
        riskTolerance:
          type: string
          description: Description of the user's risk tolerance.
          example: "Moderate risk tolerance with focus on capital preservation."
        additionalNotes:
          type: string
          description: Additional free-form notes to include in the report.
          example: "Client prefers reports focused on macroeconomic drivers."
    GenerateFXReportRequest:
      type: object
      description: >
        Request payload for generating an FX BrowserAct report based on an
        existing BrowserAct run.
      properties:
        browseract_run_id:
          type: string
          description: Identifier of the BrowserAct run to use for this report.
          example: "run_12345_fx"
        include_technical:
          type: boolean
          description: Whether to include technical analysis sections.
          default: true
          example: true
        include_sentiment:
          type: boolean
          description: Whether to include sentiment analysis sections.
          default: true
          example: true
        include_economic:
          type: boolean
          description: Whether to include economic indicator sections.
          default: true
          example: true
        include_macro:
          type: boolean
          description: Whether to include macroeconomic overview sections.
          default: true
          example: true
        documentero_template_id:
          type: string
          nullable: true
          description: Optional identifier of the Documentero template used to render the report.
          example: "fx_standard_template_v1"
        use_sample_data:
          type: boolean
          description: Whether to use sample data instead of live data for the report.
          default: false
          example: false
      required:
        - browseract_run_id
    BrowserActDataRequest:
      type: object
      description: >
        Request payload that carries BrowserAct FX batch data directly, instead
        of resolving it from backend storage.
      properties:
        batch_data:
          type: object
          description: Batch FX data used to generate the report.
          additionalProperties: true
          example:
            symbols:
              - "EURUSD"
              - "GBPUSD"
            timeframe: "1D"
            data_points: 250
        include_technical:
          type: boolean
          description: Whether to include technical analysis sections.
          default: true
          example: true
        include_sentiment:
          type: boolean
          description: Whether to include sentiment analysis sections.
          default: true
          example: true
        include_economic:
          type: boolean
          description: Whether to include economic indicator sections.
          default: true
          example: true
        include_macro:
          type: boolean
          description: Whether to include macroeconomic overview sections.
          default: true
          example: true
        documentero_template_id:
          type: string
          nullable: true
          description: Optional identifier of the Documentero template used to render the report.
          example: "fx_from_data_template_v1"
      required:
        - batch_data
    FullFXReportRequest:
      type: object
      description: >
        Full FX report request including include flags, an optional template,
        and optional trading context.
      properties:
        include_technical:
          type: boolean
          description: Whether to include technical analysis sections.
          default: true
          example: true
        include_sentiment:
          type: boolean
          description: Whether to include sentiment analysis sections.
          default: true
          example: true
        include_economic:
          type: boolean
          description: Whether to include economic indicator sections.
          default: true
          example: true
        include_macro:
          type: boolean
          description: Whether to include macroeconomic overview sections.
          default: true
          example: true
        documentero_template_id:
          type: string
          nullable: true
          description: Optional identifier of the Documentero template used to render the report.
          example: "fx_full_template_v1"
        trading_context:
          allOf:
            - $ref: '#/components/schemas/TradingContextInput'
          nullable: true
          description: Optional trading context information to enrich the report.
    SyncFXReportResponse:
      type: object
      description: Response returned when an FX BrowserAct report is generated synchronously.
      properties:
        success:
          type: boolean
          description: Indicates whether the report generation succeeded.
          example: true
        pdf_url:
          type: string
          nullable: true
          description: URL that can be used to download the generated PDF, if available.
          example: "/api/v1/browseract/reports/files/fx%2Freport_123.pdf"
        pdf_filename:
          type: string
          nullable: true
          description: Name of the generated PDF file, if available.
          example: "browseract_fx_report_2024-01-31.pdf"
        message:
          type: string
          description: Human-readable message describing the result.
          example: "Report generated successfully."
        browseract_run_id:
          type: string
          description: Identifier of the BrowserAct run associated with the report.
          example: "run_12345_fx"
        report_date:
          type: string
          nullable: true
          description: Optional report date in ISO-8601 format (YYYY-MM-DD).
          example: "2024-01-31"
        data_summary:
          type: object
          nullable: true
          description: Optional summary of the data used to generate the report.
          additionalProperties: true
          example:
            symbols:
              - "EURUSD"
              - "GBPUSD"
            timeframe: "1D"
        error:
          type: string
          nullable: true
          description: Optional error message if the report generation failed.
          example: null
        generated_at:
          type: string
          description: Timestamp when the report was generated.
          example: "2024-01-31T09:30:00Z"
      required:
        - success
        - message
        - browseract_run_id
        - generated_at
    AsyncFXReportResponse:
      type: object
      description: >
        Response returned when an FX BrowserAct report generation task is
        accepted for asynchronous processing.
      properties:
        task_id:
          type: string
          description: Unique identifier of the asynchronous task.
          example: "task_01HXYZASYNC1234FX"
        status:
          type: string
          description: Initial status of the task after submission.
          example: "queued"
        message:
          type: string
          description: Human-readable message describing the task submission result.
          example: "Report generation task accepted."
        browseract_run_id:
          type: string
          description: Identifier of the BrowserAct run associated with the task.
          example: "run_12345_fx"
        estimated_completion_seconds:
          type: integer
          format: int32
          nullable: true
          description: Estimated number of seconds until the task completes, if available.
          example: 120
      required:
        - task_id
        - status
        - message
        - browseract_run_id
    ValidateFXResponse:
      type: object
      description: Structured result of validating a BrowserAct FX data payload.
      properties:
        valid:
          type: boolean
          description: Indicates whether the payload passed all validation checks.
          example: true
        summary:
          type: object
          description: High-level summary of validation results.
          additionalProperties: true
          example:
            errors: 0
            warnings: 1
        details:
          type: object
          description: Detailed validation information, including field-level messages.
          additionalProperties: true
          example:
            missing_fields: []
            warnings:
              - field: "batch_data.symbols"
                message: "Some symbols have limited historical data."
        report_date:
          type: string
          nullable: true
          description: Optional report date resolved from the payload, if available.
          example: "2024-01-31"
        report_time:
          type: string
          nullable: true
          description: Optional report time resolved from the payload, if available.
          example: "09:30:00"
      required:
        - valid
        - summary
        - details
    Error:
      type: object
      description: Generic error response for BrowserAct FX endpoints.
      properties:
        code:
          type: integer
          format: int32
          description: Application-specific error code.
          example: 400
        message:
          type: string
          description: Human-readable error message.
          example: "Invalid request payload"
      required:
        - code
        - message